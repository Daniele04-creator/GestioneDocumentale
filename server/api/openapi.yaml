                      createdAt:
                        type: string
                        format: date-time
                        example: '2026-01-01T10:00:00.000Z'
                      updatedAt:
                        type: string
                        format: date-time
                        nullable: true
                        example: null
                      archivedAt:
                        type: string
                        format: date-time
