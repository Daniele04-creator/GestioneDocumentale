openapi: 3.0.0
info:
  title: Management as Code Documents API
  description: API del modulo documentale project-scoped di Management as Code.
  contact: {}
  version: 0.1.0
servers:
  - url: 'http://localhost:3000'
    description: Local development server
tags:
  - name: Project documents
    description: ''
  - name: Health
    description: ''
paths:
  /api/v1/health:
    get:
      tags:
        - Health
      summary: Health check
      description: Verifica che il backend sia avviato.
      operationId: HealthController_getHealth
      parameters: []
      responses:
        '200':
          description: Backend is running.
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - timestamp
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time
                    example: '2026-01-01T10:00:00.000Z'
      x-swagger-router-controller: Health
  '/api/v1/projects/{projectId}/documents':
    get:
      tags:
        - Project documents
      summary: List project documents
      description: >-
        Restituisce la home documentale del progetto, con documenti raggruppati per package e task e filtrabili tramite
        query parameters.
      operationId: ProjectDocumentsController_listProjectDocuments
      parameters:
        - name: search
          in: query
          required: false
          style: form
          explode: true
          schema:
            example: srs
        - name: status
          in: query
          required: false
          style: form
          explode: true
          schema:
            type: string
            enum:
              - draft
              - in_review
              - approved
              - archived
        - name: tag
          in: query
          required: false
          style: form
          explode: true
          schema:
            example: Architettura
        - name: ownerId
          in: query
          required: false
          style: form
          explode: true
          schema:
            example: owner-001
        - name: taskId
          in: query
          required: false
          style: form
          explode: true
          schema:
            example: task-001
        - name: packageId
          in: query
          required: false
          style: form
          explode: true
          schema:
            example: package-001
        - name: projectId
          in: path
          description: ID del progetto
          required: true
          style: simple
          explode: false
          schema:
            example: project-001
      responses:
        '200':
          description: Project document home returned.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - meta
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      required:
                        - project
                        - id
                        - name
                        - parentPackage
                        - taskCount
                        - documentCount
                        - statusSummary
                        - tasks
                      properties:
                        project:
                          type: object
                          required:
                            - id
                            - name
                          properties:
                            id:
                              type: string
                              example: project-001
                            name:
                              type: string
                              example: Management as Code Demo
                        id:
                          type: string
                          example: package-001
                        name:
                          type: string
                          example: Documentazione requisiti
                        parentPackage:
                          type: object
                          nullable: true
                          required:
                            - id
                            - name
                          properties:
                            id:
                              type: string
                              example: package-001
                            name:
                              type: string
                              example: Documentazione requisiti
                        taskCount:
                          type: integer
                          minimum: 0
                          example: 1
                        documentCount:
                          type: integer
                          minimum: 0
                          example: 1
                        statusSummary:
                          type: object
                          required:
                            - draft
                            - in_review
                            - approved
                            - archived
                          properties:
                            draft:
                              type: integer
                              minimum: 0
                              example: 0
                            in_review:
                              type: integer
                              minimum: 0
                              example: 0
                            approved:
                              type: integer
                              minimum: 0
                              example: 1
                            archived:
                              type: integer
                              minimum: 0
                              example: 0
                        tasks:
                          type: array
                          items:
                            type: object
                            required:
                              - id
                              - name
                              - documentCount
                              - statusSummary
                              - documents
                            properties:
                              id:
                                type: string
                                example: task-001
                              name:
                                type: string
                                example: Redazione Specifica SRS
                              documentCount:
                                type: integer
                                minimum: 0
                                example: 1
                              statusSummary:
                                type: object
                                required:
                                  - draft
                                  - in_review
                                  - approved
                                  - archived
                                properties:
                                  draft:
                                    type: integer
                                    minimum: 0
                                    example: 0
                                  in_review:
                                    type: integer
                                    minimum: 0
                                    example: 0
                                  approved:
                                    type: integer
                                    minimum: 0
                                    example: 1
                                  archived:
                                    type: integer
                                    minimum: 0
                                    example: 0
                              documents:
                                type: array
                                items:
                                  type: object
                                  required:
                                    - id
                                    - title
                                    - status
                                    - version
                                    - updatedAt
                                    - owner
                                    - tags
                                  properties:
                                    id:
                                      type: string
                                      example: DOC-001
                                    title:
                                      type: string
                                      example: Specifica SRS
                                    description:
                                      type: string
                                      example: Documento dei requisiti software
                                    status:
                                      type: string
                                      enum:
                                        - draft
                                        - in_review
                                        - approved
                                        - archived
                                      example: approved
                                    version:
                                      type: integer
                                      minimum: 1
                                      example: 1
                                    updatedAt:
                                      type: string
                                      format: date-time
                                      nullable: true
                                      example: null
                                    owner:
                                      type: object
                                      required:
                                        - id
                                        - name
                                      properties:
                                        id:
                                          type: string
                                          example: owner-001
                                        name:
                                          type: string
                                          example: Francesca R
                                    tags:
                                      type: array
                                      items:
                                        type: object
                                        required:
                                          - name
                                        properties:
                                          name:
                                            type: string
                                            example: Architettura
                  meta:
                    type: object
                    required:
                      - totalPackages
                      - totalTasks
                      - totalDocuments
                    properties:
                      totalPackages:
                        type: integer
                        minimum: 0
                        example: 1
                      totalTasks:
                        type: integer
                        minimum: 0
                        example: 1
                      totalDocuments:
                        type: integer
                        minimum: 0
                        example: 1
        '400':
          description: INVALID_QUERY_PARAM
          content:
            application/json:
              schema:
                type: object
                required:
                  - code
                  - message
                properties:
                  code:
                    type: string
                    example: ERROR_CODE
                  message:
                    type: string
                    example: Clear error message.
              examples:
                INVALID_QUERY_PARAM:
                  summary: INVALID_QUERY_PARAM
                  value:
                    code: INVALID_QUERY_PARAM
                    message: Parametro query non valido.
        '404':
          description: PROJECT_NOT_FOUND
          content:
            application/json:
              schema:
                type: object
                required:
                  - code
                  - message
                properties:
                  code:
                    type: string
                    example: ERROR_CODE
                  message:
                    type: string
                    example: Clear error message.
              examples:
                PROJECT_NOT_FOUND:
                  summary: PROJECT_NOT_FOUND
                  value:
                    code: PROJECT_NOT_FOUND
                    message: Project not found.
      x-swagger-router-controller: ProjectDocuments
  '/api/v1/projects/{projectId}/documents/{documentId}/file':
    get:
      tags:
        - Project documents
      summary: Download project document file
      description: Scarica il file associato al documento.
      operationId: ProjectDocumentsController_downloadProjectDocumentFile
      parameters:
        - name: documentId
          in: path
          description: ID del documento nel formato DOC-001
          required: true
          style: simple
          explode: false
          schema:
            pattern: '^DOC-[0-9]{3}$'
            type: string
        - name: projectId
          in: path
          description: ID del progetto
          required: true
          style: simple
          explode: false
          schema:
            example: project-001
      responses:
        '200':
          description: File binario o testuale associato al documento.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
                x-content-type: application/octet-stream
            text/plain:
              schema:
                type: string
        '400':
          description: INVALID_DOCUMENT_ID
          content:
            application/json:
              schema:
                type: object
                required:
                  - code
                  - message
                properties:
                  code:
                    type: string
                    example: ERROR_CODE
                  message:
                    type: string
                    example: Clear error message.
              examples:
                INVALID_DOCUMENT_ID:
                  summary: INVALID_DOCUMENT_ID
                  value:
                    code: INVALID_DOCUMENT_ID
                    message: Invalid document id.
        '404':
          description: 'PROJECT_NOT_FOUND, DOCUMENT_NOT_FOUND or DOCUMENT_FILE_NOT_FOUND'
          content:
            application/json:
              schema:
                type: object
                required:
                  - code
                  - message
                properties:
                  code:
                    type: string
                    example: ERROR_CODE
                  message:
                    type: string
                    example: Clear error message.
              examples:
                PROJECT_NOT_FOUND:
                  summary: PROJECT_NOT_FOUND
                  value:
                    code: PROJECT_NOT_FOUND
                    message: Project not found.
                DOCUMENT_NOT_FOUND:
                  summary: DOCUMENT_NOT_FOUND
                  value:
                    code: DOCUMENT_NOT_FOUND
                    message: Document not found.
                DOCUMENT_FILE_NOT_FOUND:
                  summary: DOCUMENT_FILE_NOT_FOUND
                  value:
                    code: DOCUMENT_FILE_NOT_FOUND
                    message: Document file not found.
      x-swagger-router-controller: ProjectDocuments
