                          - name
                        properties:
                          id:
                            type: string
                            example: package-001
                          name:
                            type: string
                            example: Documentazione requisiti
                      task:
                        type: object
                        required:
                          - id
                          - name
                        properties:
                          id:
                            type: string
                            example: task-001
                          name:
                            type: string
                            example: Redazione Specifica SRS
                      owner:
                        type: object
                        required:
                          - id
                          - name
                        properties:
                          id:
                            type: string
                            example: owner-001
